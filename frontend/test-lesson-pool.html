<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lesson Pool Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .test { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; }
    .pass { border-left: 4px solid #4caf50; }
    .fail { border-left: 4px solid #f44336; }
    .info { border-left: 4px solid #2196f3; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>🧪 Lesson Pool Test Suite</h1>
  <div id="results"></div>

  <script src="lessonPool.js"></script>
  <script>
    const results = [];

    // Test 1: Check if LESSON_POOL is loaded
    const test1 = {
      name: "window.LESSON_POOL is loaded",
      pass: typeof window.LESSON_POOL === 'object' && window.LESSON_POOL !== null,
      details: window.LESSON_POOL ? `✓ LESSON_POOL exists` : `✗ LESSON_POOL not found`
    };
    results.push(test1);

    // Test 2: Check number of topics
    const topics = Object.keys(window.LESSON_POOL || {});
    const test2 = {
      name: "Topics are loaded",
      pass: topics.length > 0,
      details: `Found ${topics.length} topic(s): ${topics.join(', ')}`
    };
    results.push(test2);

    // Test 3: Check lessons structure
    let totalLessons = 0;
    let structureValid = true;
    const topicDetails = {};

    Object.entries(window.LESSON_POOL || {}).forEach(([topic, subtopics]) => {
      let topicLessonCount = 0;
      if (typeof subtopics === 'object') {
        Object.entries(subtopics).forEach(([subtopic, lessons]) => {
          if (Array.isArray(lessons)) {
            topicLessonCount += lessons.length;
            // Check first lesson structure
            if (lessons[0]) {
              const lesson = lessons[0];
              const hasRequiredFields = lesson.title && lesson.topic && lesson.explanation && lesson.funFact;
              if (!hasRequiredFields) structureValid = false;
            }
          }
        });
      }
      topicDetails[topic] = topicLessonCount;
      totalLessons += topicLessonCount;
    });

    const test3 = {
      name: "Lesson structure is valid",
      pass: structureValid && totalLessons > 0,
      details: `Total lessons: ${totalLessons}. Per topic: ${Object.entries(topicDetails).map(([t, c]) => `${t}(${c})`).join(', ')}`
    };
    results.push(test3);

    // Display results
    const resultsDiv = document.getElementById('results');
    results.forEach(test => {
      const div = document.createElement('div');
      div.className = `test ${test.pass ? 'pass' : 'fail'}`;
      div.innerHTML = `
        <strong>${test.pass ? '✅' : '❌'} ${test.name}</strong><br>
        <small>${test.details}</small>
      `;
      resultsDiv.appendChild(div);
    });

    // Summary
    const summary = document.createElement('div');
    const passed = results.filter(r => r.pass).length;
    summary.className = `test info`;
    summary.innerHTML = `<strong>Summary: ${passed}/${results.length} tests passed</strong>`;
    resultsDiv.appendChild(summary);

    // Log to console for debugging
    console.log('=== Lesson Pool Test Results ===');
    console.log(`Total Topics: ${topics.length}`);
    console.log(`Total Lessons: ${totalLessons}`);
    console.log(`Topics Available: ${topics.join(', ')}`);
  </script>
</body>
</html>
